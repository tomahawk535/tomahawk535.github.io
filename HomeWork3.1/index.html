<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Learn Git</title>

</head>
<body>



	<script>
		var z = +prompt('Введите число от 1 до 4!!!');
		var x = 10;
		var y = 5;
	switch (z) {
		case 1:
			console.log(x+y);
			break;
		case 2:
		    console.log(x-y);
		    break;
		case 3:
		    console.log(x*y);
		    break;
		case 4:
		    console.log(x/y);
		    break;
	}
	</script>
</body>
</html>
